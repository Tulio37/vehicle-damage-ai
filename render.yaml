services:
  - type: web
    name: vehicle-damage-ai
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MOCK_MODE
        value: false
      - key: GROQ_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
